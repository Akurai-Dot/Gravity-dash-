<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gravity Dash - Thematic Edition</title>
    <!-- Brython Core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/brython/3.12.0/brython.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/brython/3.12.0/brython_stdlib.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="brython()">
    <!-- Intro Overlay -->
    <div id="intro-screen">
        <h1 id="intro-text"></h1>
    </div>

    <!-- Map Selection Overlay -->
    <div id="map-screen" style="display: none;">
        <h2>MAPA DE FASES</h2>
        <div id="map-nodes"></div>
    </div>

    <!-- Game HUD -->
    <div id="game-ui" style="display: none;">
        <div class="hud-top">
            <div class="level-info">
                <span id="hud-level-theme">Tema</span>
                <span id="hud-level">Nível 1</span>
            </div>
            <div class="progress-wrapper">
                <div id="progress-container">
                    <div id="progress-bar"></div>
                    <div id="progress-glow"></div>
                </div>
                <span id="progress-text">0%</span>
            </div>
        </div>
        <div id="hud-messages"></div>
    </div>

    <!-- Game Canvas -->
    <div id="canvas-container">
        <!-- Canvas Background Layer for Themes -->
        <div id="canvas-bg"></div>
        <canvas id="gameCanvas" width="800" height="400" style="display: none;"></canvas>
    </div>

    <!-- Main Logic -->
    <script type="text/python" src="main.py"></script>
</body>
</html>
